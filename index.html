<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App - Master</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body class="dark">
    <div class="layout">
        <aside class="sidebar">
            <div class="logo">✅ TodoApp</div>
            <nav>
                <button class="nav-btn actif" onclick="showPage('dashboard', this)">📊 Dashboard</button>
                <button class="nav-btn" onclick="showPage('taches', this)">📋 Tâches</button>
                <button class="nav-btn" onclick="showPage('semaine', this)">📅 Semaine</button>
                <button class="nav-btn" onclick="showPage('categories', this)">📂 Catégories</button>
                <button class="nav-btn" onclick="showPage('collab', this)">🤝 Collab</button>
            </nav>
            <div class="sidebar-footer">
                <button id="theme-btn" onclick="toggleTheme()">☀️ Thème clair</button>
            </div>
        </aside>

        <main class="content">
            <div id="page-dashboard" class="page actif">
                <div class="dashboard-grid">
                    <div class="stat-card blue">
                        <div class="stat-val" id="s-total">0</div>
                        <div class="stat-lbl">Total</div>
                    </div>
                    <div class="stat-card green">
                        <div class="stat-val" id="s-faites">0</div>
                        <div class="stat-lbl">Terminées</div>
                    </div>
                    <div class="stat-card orange">
                        <div class="stat-val" id="s-actives">0</div>
                        <div class="stat-lbl">Actives</div>
                    </div>
                    <div class="stat-card red">
                        <div class="stat-val" id="s-retard">0</div>
                        <div class="stat-lbl">En retard</div>
                    </div>
                </div>
                <div class="charts-grid">
                    <div class="chart-card">
                        <canvas id="chart-doughnut"></canvas>
                    </div>
                    <div class="chart-card">
                        <canvas id="chart-line"></canvas>
                    </div>
                </div>
            </div>

            <div id="page-taches" class="page">
                <div class="input-card">
                    <div class="input-row">
                        <input type="text" id="new-task" placeholder="Quelle est la prochaine étape ?" onkeypress="if(event.key==='Enter') ajouterTache()" />
                        <select id="new-task-cat"></select>
                        <button onclick="ajouterTache()">Ajouter</button>
                    </div>
                    <div class="input-row-2">
                        <select id="priorite">
                            <option value="basse">🔵 Basse</option>
                            <option value="moyenne" selected>🟢 Moyenne</option>
                            <option value="haute">🔴 Haute</option>
                        </select>
                        <input type="date" id="echeance" />
                        <input type="time" id="heure-debut" title="Début" />
                        <input type="time" id="heure-fin" title="Fin" />
                    </div>
                </div>

                <div class="list-header">
                    <div class="search-bar">
                        <input type="text" id="recherche" placeholder="🔍 Rechercher..." oninput="afficher(filtreActif())" />
                    </div>
                    <div class="filtres-bar">
                        <button class="actif" data-filtre="toutes" onclick="setFiltre(this)">Toutes</button>
                        <button data-filtre="actives" onclick="setFiltre(this)">Actives</button>
                        <button data-filtre="terminees" onclick="setFiltre(this)">Faites</button>
                    </div>
                </div>

                <ul id="liste-taches"></ul>
                <div class="compteur-bar"><span id="compteur"></span></div>
            </div>

            <div id="page-collab" class="page">
                <div class="collab-card">
                    <h3>🤝 Partage</h3>
                    <p>Exportez vos données pour les sauvegarder ou les partager.</p>
                    <button onclick="exporterJSON()">Exporter JSON</button>
                </div>
            </div>
        </main>
    </div>
    <div id="toast" class="toast"></div>
    <script src="app.js"></script>
</body>
</html>
